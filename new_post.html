<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create a New Post</title>
  <link id="theme-style" rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="header-placeholder"></div>
  <script src="loadHeader.js"></script>

  <main class="content">
    <section class="post-card">
      <h1>Create a New Post</h1>
      <p class="form-helper">Fill out the form below to create a listing. Required fields will guide you as you type.</p>

      <form class="post-form" novalidate>
        <div class="form-field">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" placeholder="Enter post title" maxlength="60" aria-describedby="title-feedback" />
          <p class="field-feedback" id="title-feedback" aria-live="polite"></p>
        </div>

        <div class="form-field">
          <label for="category">Category</label>
          <select id="category" name="category" aria-describedby="category-feedback">
            <option value="">Select a category</option>
            <option value="Bikes">Bikes</option>
            <option value="Furniture">Furniture</option>
            <option value="Cars">Cars</option>
            <option value="Electronics">Electronics</option>
          </select>
          <p class="field-feedback" id="category-feedback" aria-live="polite"></p>
        </div>

        <div class="form-field">
          <label for="price">Price</label>
          <input type="text" id="price" name="price" placeholder="$0.00" inputmode="decimal" aria-describedby="price-feedback" />
          <p class="field-feedback" id="price-feedback" aria-live="polite"></p>
        </div>

        <div class="form-field">
          <label for="location">Location</label>
          <input type="text" id="location" name="location" placeholder="Enter location" maxlength="40" aria-describedby="location-feedback" />
          <p class="field-feedback" id="location-feedback" aria-live="polite"></p>
        </div>

        <div class="form-field">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="5" placeholder="Write a short description" maxlength="300" aria-describedby="description-feedback"></textarea>
          <p class="field-feedback" id="description-feedback" aria-live="polite"></p>
        </div>

        <button type="submit" class="submit-btn">Post Listing</button>
        <p class="form-status" id="form-status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="loadPost.js"></script>
</body>
</html>
