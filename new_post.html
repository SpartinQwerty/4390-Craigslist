<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create a New Post</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div id="header-placeholder"></div>
  <script src="loadHeader.js"></script>
  <script src="loadPost.js"></script>

  <main class="content">
    <section class="post-card">
      <h1>Create a New Post</h1>

      <form class="post-form">
        <label for="title">Title</label>
        <input type="text" id="title" placeholder="Enter post title" />

        <label for="category">Category</label>
        <select id="category">
          <option>Bikes</option>
          <option>Furniture</option>
          <option>Cars</option>
          <option>Electronics</option>
        </select>

        <label for="price">Price</label>
        <input type="text" id="price" placeholder="$0.00" />

        <label for="location">Location</label>
        <input type="text" id="location" placeholder="Enter location" />

        <label for="description">Description</label>
        <textarea id="description" rows="5" placeholder="Write a short description"></textarea>

        <button type="submit" class="submit-btn">Post Listing</button>
      </form>
    </section>
  </main>

  <script>
    // Form submission with loading state
    const form = document.querySelector('.post-form');
    const submitBtn = document.querySelector('.submit-btn');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Add loading state to button
      submitBtn.classList.add('btn-loading');
      submitBtn.disabled = true;
      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'Posting...';

      // Simulate form submission delay (1.5 seconds)
      setTimeout(function() {
        // Remove loading state
        submitBtn.classList.remove('btn-loading');
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
        
        // Show success message
        const successMsg = document.createElement('p');
        successMsg.style.color = '#0b74c4';
        successMsg.style.marginTop = '16px';
        successMsg.textContent = '✓ Post created successfully! Redirecting...';
        form.parentElement.appendChild(successMsg);
        
        // Redirect after 2 seconds
        setTimeout(function() {
          window.location.href = 'index.html';
        }, 2000);
      }, 1500);
    });
  </script>
</body>
</html>
