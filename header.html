<header class="header">
  <div class="topbar-left">
    <a href="index.html" class="logo">
      <img src="logo.png" alt="Logo" style="height: 40px" />
    </a>

    <div class="location-box">
      <label for="locationMenu">Location:</label>
      <select id="locationMenu">
        <option value="Charlotte">Charlotte</option>
        <option value="New York">New York</option>
        <option value="Miami">Miami</option>
        <option value="Chicago">Chicago</option>
      </select>
    </div>
  </div>

  <div class="topbar-center">
    <form action="search.html" method="get" id="searchForm" onsubmit="return false;">
      <input type="search" id="headerSearch" name="q" placeholder="Search" autocomplete="off" />
      <button type="submit">🔎</button>
      <div id="searchSuggestions" class="search-suggestions">
        <div id="headerLoader" class="header-loader hidden"></div>
      </div>
    </form>

    <div id="search-suggestions" class="search-suggestions hidden"></div>
  </div>

  <nav class="topbar-right">
    <a href="index.html" title="Home">🏠</a>
    <a href="new_post.html" title="New Post">✏️</a>
    <a href="account.html" title="Account">👤</a>
    <button id="darkModeButton" title="Dark Mode">🌙</button>
  </nav>

  <!-- Mobile hamburger menu -->
  <button id="mobileMenuToggle" class="mobile-menu-toggle" title="Menu">☰</button>
  <div id="mobileMenu" class="mobile-menu">
    <div class="mobile-menu-location">
      <label for="mobileLocationMenu">Location:</label>
      <select id="mobileLocationMenu">
        <option value="Charlotte">Charlotte</option>
        <option value="New York">New York</option>
        <option value="Miami">Miami</option>
        <option value="Chicago">Chicago</option>
      </select>
    </div>
    <nav class="mobile-menu-nav">
      <a href="index.html" title="Home">🏠 Home</a>
      <a href="new_post.html" title="New Post">✏️ New Post</a>
      <a href="account.html" title="Account">👤 Account</a>
      <button id="mobileDarkModeButton" title="Dark Mode">🌙 Dark Mode</button>
    </nav>
  </div>
</header>
