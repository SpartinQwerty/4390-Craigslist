<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Results - Craigslist</title>
    <script>
      // Apply saved theme immediately to prevent flash
      if (localStorage.getItem('theme') === 'darkmode.css') {
        document.write('<link id="theme-style" rel="stylesheet" href="darkmode.css" />');
      } else {
        document.write('<link id="theme-style" rel="stylesheet" href="styles.css" />');
      }
    </script>
    <script src="cards.js"></script>
  </head>

  <body>
    <div id="header-placeholder"></div>
    <script src="loadHeader.js"></script>

    <div class="search-page-container">
      <!-- Mobile Filter Toggle -->
      <button class="mobile-filter-toggle" id="mobile-filter-toggle">
        <span class="toggle-label">Filters</span>
        <span class="toggle-icon">&#9776;</span>
      </button>

      <!-- Filters Sidebar -->
      <aside class="search-filters" id="search-filters">
        <h3>Filters</h3>
        
        <div class="filter-group">
          <label for="price-filter">Price:</label>
          <select id="price-filter" class="filter-select">
            <option value="any">Any Price</option>
            <option value="0-50">$0 - $50</option>
            <option value="50-100">$50 - $100</option>
            <option value="100-500">$100 - $500</option>
            <option value="500-1000">$500 - $1000</option>
            <option value="1000">$1000+</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="photos-filter" class="checkbox-label">
            <input type="checkbox" id="photos-filter" class="filter-checkbox" />
            Has photos
          </label>
        </div>

        <div class="filter-group">
          <label for="time-filter">Time:</label>
          <select id="time-filter" class="filter-select">
            <option value="any">All Time</option>
            <option value="1-day">Last 24 hours</option>
            <option value="7-days">Last 7 days</option>
            <option value="30-days">Last 30 days</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="sort-filter">Sort By:</label>
          <select id="sort-filter" class="filter-select">
            <option value="recent">Most Recent</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
            <option value="popular">Most Popular</option>
            <option value="viewed">Most Viewed</option>
            <option value="rating">Best Rating</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="location-filter">Location:</label>
          <input type="text" id="location-filter" class="filter-input" value="Charlotte, NC 28262" placeholder="Enter location" />
        </div>

        <button class="apply-filters-btn">Apply Filters</button>
      </aside>

      <!-- Main Content -->
      <main class="search-content">
        <div class="search-header">
          <h2 id="results-title">Results for "Bikes"</h2>
          <div class="results-count">
            <span id="result-count">6</span> results
          </div>
        </div>

        <div id="search-results-list" class="search-results-list">
          <!-- Cards will be loaded here by JavaScript -->
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination-container">
          <!-- Pagination buttons will be generated here by JavaScript -->
        </div>

        <!-- No Results Message -->
        <p id="no-results-message" class="no-results-message" style="display: none;">No results found.</p>
      </main>
    </div>

    <script>
      // Get search query and category from URL
      const urlParams = new URLSearchParams(window.location.search);
      const searchQuery = urlParams.get('q') || '';
      const categoryFilter = urlParams.get('category') || '';
      
      const resultsTitle = document.getElementById('results-title');
      const resultCount = document.getElementById('result-count');
      const noResultsMsg = document.getElementById('no-results-message');
      const searchResultsList = document.getElementById('search-results-list');
      const paginationContainer = document.getElementById('pagination-container');

      // Pagination settings
      const CARDS_PER_PAGE = 6;
      let allResults = [];
      let currentPage = 1;
      let totalPages = 1;

      // Display cards for the current page
      function displayPage(pageNum) {
        if (pageNum < 1 || pageNum > totalPages) return;
        
        // Show loading overlay
        const overlay = document.createElement('div');
        overlay.className = 'loading-overlay active';
        overlay.innerHTML = `
          <div class="loading-overlay-content">
            <div class="loading-overlay-spinner"></div>
            <div class="loading-overlay-text">Loading page...</div>
          </div>
        `;
        document.body.appendChild(overlay);
        
        // Simulate page loading (500ms)
        setTimeout(() => {
          currentPage = pageNum;
          const startIdx = (pageNum - 1) * CARDS_PER_PAGE;
          const endIdx = startIdx + CARDS_PER_PAGE;
          const pageCards = allResults.slice(startIdx, endIdx);

          // Build HTML for current page
          let html = '';
          pageCards.forEach(card => {
            html += cardsDatabase.createCardElement(card);
          });
          searchResultsList.innerHTML = html;

          // Update pagination buttons
          generatePaginationButtons();
          
          // Remove overlay
          overlay.remove();
          
          // Scroll to top
          document.querySelector('.search-page-container').scrollIntoView();
        }, 500);
      }

      // Generate pagination buttons based on results
      function generatePaginationButtons() {
        paginationContainer.innerHTML = '';

        if (totalPages <= 1) {
          return; // No pagination needed
        }

        // Previous button
        const prevBtn = document.createElement('button');
        prevBtn.className = 'pagination-btn';
        prevBtn.textContent = '←';
        prevBtn.addEventListener('click', () => {
          if (currentPage > 1) displayPage(currentPage - 1);
        });
        paginationContainer.appendChild(prevBtn);

        // Page number buttons
        for (let i = 1; i <= Math.min(totalPages, 6); i++) {
          const btn = document.createElement('button');
          btn.className = 'pagination-btn' + (i === currentPage ? ' active' : '');
          btn.textContent = i;
          btn.addEventListener('click', () => displayPage(i));
          paginationContainer.appendChild(btn);
        }

        // Next button
        const nextBtn = document.createElement('button');
        nextBtn.className = 'pagination-btn';
        nextBtn.textContent = '→';
        nextBtn.addEventListener('click', () => {
          if (currentPage < totalPages) displayPage(currentPage + 1);
        });
        paginationContainer.appendChild(nextBtn);
      }

      // Load and filter cards
      function loadCards() {
        // Check if cardsDatabase is available
        if (typeof cardsDatabase === 'undefined') {
          console.error('cardsDatabase is not defined - cards.js may not have loaded');
          searchResultsList.innerHTML = '<p style="color: red; padding: 20px;">ERROR: Card database failed to load. Please check browser console.</p>';
          noResultsMsg.style.display = 'none';
          return;
        }

        if (!cardsDatabase.cards || !Array.isArray(cardsDatabase.cards)) {
          console.error('cardsDatabase.cards is not an array or is missing');
          searchResultsList.innerHTML = '<p style="color: red; padding: 20px;">ERROR: Card data is invalid.</p>';
          noResultsMsg.style.display = 'none';
          return;
        }

        let results = cardsDatabase.cards;
        console.log('✓ Card database loaded. Total cards:', results.length);
        console.log('✓ Search query from URL:', searchQuery || '(empty)');
        console.log('✓ Category filter from URL:', categoryFilter || '(empty)');

        // Filter by category if provided
        if (categoryFilter) {
          const before = results.length;
          results = cardsDatabase.getByCategoryTag(categoryFilter);
          console.log('✓ Category filter applied. Results:', before, '→', results.length);
        }

        // Filter by search query if provided
        if (searchQuery.trim()) {
          const before = results.length;
          results = cardsDatabase.search(searchQuery);
          console.log('✓ Search filter applied. Results:', before, '→', results.length);
        }

        // Store all results
        allResults = results;
        
        // Build results title
        let titleText = 'All Listings';
        if (categoryFilter && searchQuery) {
          titleText = `${categoryFilter} results for "${searchQuery}"`;
        } else if (categoryFilter) {
          titleText = categoryFilter.charAt(0).toUpperCase() + categoryFilter.slice(1);
        } else if (searchQuery) {
          titleText = `Results for "${searchQuery}"`;
        }
        
        // Calculate total pages
        totalPages = Math.ceil(results.length / CARDS_PER_PAGE);
        currentPage = 1;

        // Display results
        if (results.length > 0) {
          resultsTitle.textContent = titleText;
          resultCount.textContent = results.length;
          noResultsMsg.style.display = 'none';
          displayPage(1);
          console.log('✓ Successfully loaded', results.length, 'cards in', totalPages, 'pages');
        } else {
          searchResultsList.innerHTML = '';
          paginationContainer.innerHTML = '';
          resultsTitle.textContent = titleText;
          resultCount.textContent = 0;
          noResultsMsg.style.display = 'block';
          console.log('⚠ No results found');
        }
      }

      // Load cards on page load
      loadCards();

      // Mobile filter toggle
      const mobileToggle = document.getElementById('mobile-filter-toggle');
      const searchFilters = document.getElementById('search-filters');

      if (mobileToggle) {
        mobileToggle.addEventListener('click', function() {
          searchFilters.classList.toggle('active');
          mobileToggle.classList.toggle('active');
        });

        // Close filters when clicking outside on mobile
        document.addEventListener('click', function(event) {
          const isMobile = window.innerWidth <= 768;
          if (isMobile && !event.target.closest('.search-filters') && !event.target.closest('.mobile-filter-toggle')) {
            searchFilters.classList.remove('active');
            mobileToggle.classList.remove('active');
          }
        });
      }

      // Filter handler with loading state
      document.querySelector('.apply-filters-btn').addEventListener('click', function() {
        const mainContent = document.querySelector('main');
        
        // Create and show filter overlay
        const filterOverlay = document.createElement('div');
        filterOverlay.className = 'filter-overlay active';
        filterOverlay.innerHTML = `<div class="filter-loader"></div>`;
        mainContent.style.position = 'relative';
        mainContent.appendChild(filterOverlay);
        
        // Simulate filtering (1.2 seconds)
        setTimeout(function() {
          filterOverlay.remove();
          // Filters applied
        }, 1200);
      });
    </script>
  </body>
</html>
