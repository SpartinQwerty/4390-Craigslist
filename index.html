<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page</title>
    <script>
      // Apply saved theme immediately to prevent flash
      if (localStorage.getItem('theme') === 'darkmode.css') {
        document.write('<link id="theme-style" rel="stylesheet" href="darkmode.css" />');
      } else {
        document.write('<link id="theme-style" rel="stylesheet" href="styles.css" />');
      }
    </script>
    <script src="cards.js"></script>
  </head>

  <body>
    <div id="header-placeholder"></div>
    <script src="loadHeader.js"></script>

    <main class="content">
      <section class="category-grid">
        <button
          type="button"
          class="category-card tooltip-trigger hover-bulge"
          data-category="forsale"
          data-tooltip="Browse For Sale listings"
          onclick="window.location.href='search.html?category=for+sale'"
        >
          For Sale
        </button>

        <button
          type="button"
          class="category-card tooltip-trigger hover-bulge"
          data-category="service"
          data-tooltip="Browse Services"
          onclick="window.location.href='search.html?category=services'"
        >
          Services
        </button>

        <button
          type="button"
          class="category-card tooltip-trigger hover-bulge"
          data-category="discussion"
          data-tooltip="Browse Discussion topics"
          onclick="window.location.href='search.html?category=discussion'"
        >
          Discussion Forms
        </button>

        <button
          type="button"
          class="category-card tooltip-trigger hover-bulge"
          data-category="community"
          data-tooltip="Browse Community posts"
          onclick="window.location.href='search.html?category=community'"
        >
          Community
        </button>

        <button
          type="button"
          class="category-card tooltip-trigger hover-bulge"
          data-category="housing"
          data-tooltip="Browse Housing listings"
          onclick="window.location.href='search.html?category=housing'"
        >
          Housing
        </button>

        <button
          type="button"
          class="category-card tooltip-trigger hover-bulge"
          data-category="jobs"
          data-tooltip="Browse Job postings"
          onclick="window.location.href='search.html?category=jobs'"
        >
          Jobs
        </button>
      </section>

      <section class="recent-card">
        <h2>Recent Activity</h2>

        <div
          id="search-results-message"
          class="search-results-message"
          aria-live="polite"
        ></div>

        <div class="recent-list" id="recent-list">
          <!-- 2 most recent cards will be loaded here by JavaScript -->
        </div>

        <p id="no-results-message" hidden>No results found.</p>
        <p class="empty-message" hidden>No other activity to show</p>
      </section>
    </main>

        <div id="loading-spinner"></div>

<script>
  // Load 2 most recent cards for Recent Activity section
  function loadRecentCards() {
    if (typeof cardsDatabase === 'undefined' || !cardsDatabase.cards) {
      console.error('cardsDatabase not available');
      return;
    }

    // Sort cards by date (assuming newer dates are more recent)
    // For now, we'll take the first 2 cards (can be enhanced with actual date parsing)
    const recentCards = cardsDatabase.cards.slice(0, 2);
    const recentList = document.getElementById('recent-list');

    recentList.innerHTML = '';
    recentCards.forEach(card => {
      const recentItem = document.createElement('a');
      recentItem.href = `listing.html?id=${card.id}`;
      recentItem.className = 'recent-item tooltip-trigger hover-bulge searchable-item';
      recentItem.setAttribute('data-tooltip', 'Go to listing page');
      
      // Handle image display
      const imageHTML = card.image.startsWith('images/')
        ? `<img src="${card.image}" alt="${card.title}" style="width: 100%; height: 100%; object-fit: cover;"/>`
        : card.image;

      // Create category tag badge
      const categoryTag = card.categoryTag ? `<span class="category-tag">${card.categoryTag}</span>` : '';

      recentItem.innerHTML = `
        <div class="recent-image">${imageHTML}</div>
        <div class="recent-details">
          ${categoryTag}
          <h3>${card.title}</h3>
          <p>${card.price}</p>
          <p>${card.date}</p>
        </div>
        <div class="recent-description">
          <p>${card.description}</p>
        </div>
        <div class="recent-user">
          <p>${card.rating}</p>
          <p>${card.creator}</p>
        </div>
      `;
      recentList.appendChild(recentItem);
    });
  }

  // Load recent cards on page load
  loadRecentCards();

  function placeholderAction(sectionName) {
    alert(sectionName + " placeholder");
  }
</script>

<script src="script.js"></script>
</body>
</html>
